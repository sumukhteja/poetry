<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optimistic Lad | Literary Archive</title>
  <meta name="description"
    content="A curated collection of poetry and field notes, presented in a minimalist, tactile digital archive.">
  <!-- Premium Typography -->
  <link
    href="https://fonts.googleapis.com/css2?family=La+Belle+Aurore&family=Cinzel:wght@400;500;700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* Palette: Sophisticated Neutrals (Light) */
      --bg-canvas: #fbfaf8;
      --bg-paper: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #5a5a5a;
      --accent-color: #726456;
      --accent-soft: rgba(114, 100, 86, 0.1);
      --border-color: rgba(0, 0, 0, 0.06);

      /* Typography */
      --font-serif: 'EB Garamond', serif;
      --font-display: 'Cinzel', serif;
      --font-hand: 'La Belle Aurore', cursive;
      --font-sans: 'Inter', sans-serif;

      /* Motion */
      --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --bg-canvas: #121212;
      --bg-paper: #1a1a1a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --accent-color: #c4b5a6;
      --accent-soft: rgba(196, 181, 166, 0.1);
      --border-color: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      background-color: var(--bg-canvas);
      background-image:
        linear-gradient(rgba(0, 0, 0, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, .03) 1px, transparent 1px);
      background-size: 50px 50px;
      color: var(--text-primary);
      font-family: var(--font-serif);
      line-height: 1.8;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Subtle Grain Texture */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://www.transparenttextures.com/patterns/asfalt-light.png");
      opacity: 0.15;
      pointer-events: none;
      z-index: 100;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-canvas);
    }

    ::-webkit-scrollbar-thumb {
      background: #d4d0c8;
      border-radius: 10px;
    }

    header {
      padding: clamp(3rem, 10vh, 6rem) 1.5rem 3rem;
      text-align: center;
      max-width: 1000px;
      margin: 0 auto;
    }

    .brand-title {
      font-family: var(--font-hand);
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      text-transform: none;
      margin-bottom: 0.2rem;
      color: var(--text-primary);
      position: relative;
      display: inline-block;
    }

    .user-meta {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      color: var(--text-secondary);
      margin: 0.2rem 0;
      letter-spacing: 0.1em;
      opacity: 0.7;
    }

    .brand-subtitle {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.4rem;
      color: var(--accent-color);
      letter-spacing: 0.02em;
      margin-top: 0.5rem;
      opacity: 0.8;
    }

    .search-wrapper {
      margin: 2.5rem auto 0;
      max-width: 400px;
      position: relative;
    }

    #search-input {
      width: 100%;
      padding: 1rem 1.5rem;
      border: 1px solid var(--border-color);
      background: var(--bg-paper);
      font-family: var(--font-serif);
      font-size: 1rem;
      font-style: italic;
      text-align: center;
      border-radius: 50px;
      transition: var(--transition-smooth);
      outline: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
      color: var(--text-primary);
    }

    #search-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 8px 30px rgba(114, 100, 86, 0.1);
      transform: translateY(-2px);
    }

    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1.5rem 10rem;
    }

    /* Poem Entry Layout */
    .poem-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 3.5rem;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    @media (min-width: 1024px) {
      .poem-grid {
        grid-template-columns: repeat(3, 1fr);
        column-gap: 3rem;
        row-gap: 8rem;
        align-items: start;
      }

      /* Staggered organic offset for the middle column */
      .poem-card:nth-child(3n+2) {
        margin-top: 8rem;
      }
    }

    .poem-grid.loading {
      opacity: 0;
    }

    .poem-card {
      background: var(--bg-paper);
      padding: clamp(2.5rem, 6vw, 4rem);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow:
        0 10px 30px -10px rgba(0, 0, 0, 0.05),
        0 2px 5px rgba(0, 0, 0, 0.02);
      cursor: pointer;
      transition: var(--transition-smooth);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .poem-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent-color);
      opacity: 0;
      transition: var(--transition-smooth);
    }

    .poem-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.08);
      border-color: rgba(114, 100, 86, 0.2);
    }

    .poem-card:hover::before {
      opacity: 0.6;
    }

    .poem-card h2 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 400;
      margin: 0 0 1.5rem;
      color: var(--accent-color);
      letter-spacing: -0.01em;
      text-transform: lowercase;
      border-bottom: 1px solid var(--accent-soft);
      padding-bottom: 0.5rem;
      display: inline-block;
    }

    .poem-content {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      color: var(--text-primary);
      white-space: pre-wrap;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      transition: var(--transition-smooth);
    }

    .poem-card.expanded .poem-content {
      -webkit-line-clamp: unset;
      line-clamp: unset;
      display: block;
    }

    .interaction-hint {
      margin-top: 2rem;
      font-family: var(--font-hand);
      font-size: 1.3rem;
      color: var(--accent-color);
      opacity: 0.4;
      transition: var(--transition-smooth);
    }

    .poem-card:hover .interaction-hint {
      opacity: 0.9;
    }

    .poem-card.expanded .interaction-hint {
      display: none;
    }

    /* Pagination controls */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin: 4rem 0;
      font-family: var(--font-display);
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: var(--accent-color);
      transition: var(--transition-smooth);
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-info {
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 0.2em;
    }

    footer {
      padding: 10rem 1.5rem 8rem;
      background: var(--bg-canvas);
      border-top: 1px solid var(--border-color);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .footer-flourish {
      width: 100%;
      max-width: 250px;
      margin: 0 auto 3rem;
      display: block;
      color: var(--accent-color);
      opacity: 0.2;
    }

    .footer-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--accent-color);
      margin-bottom: 3rem;
      display: block;
    }

    .footer-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 4rem;
    }

    .discord-badge {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--text-primary);
      text-decoration: none;
      transition: var(--transition-smooth);
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
    }

    .discord-badge:hover {
      color: var(--accent-color);
      transform: translateY(-2px);
    }

    .discord-badge::before,
    .discord-badge::after {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--accent-color);
      opacity: 0.3;
    }

    .copyright {
      font-family: var(--font-serif);
      font-size: 0.8rem;
      color: var(--text-secondary);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* Empty/Loading states */
    .message-state {
      text-align: center;
      padding: 5rem 0;
      font-family: var(--font-hand);
      font-size: 2rem;
      color: var(--text-secondary);
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      header {
        padding-top: 3rem;
      }

      .poem-card {
        padding: 2rem 1.5rem;
      }

      .pagination {
        gap: 0.5rem;
      }

      .nav-btn span {
        display: none;
      }
    }

    /* Fixed Toggle Button Styles */
    .theme-toggle {
      position: fixed;
      top: 2rem;
      right: 2rem;
      z-index: 1000;
      background: var(--bg-paper);
      border: 1px solid var(--border-color);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: var(--transition-smooth);
    }

    .theme-toggle:hover {
      transform: scale(1.1) rotate(15deg);
    }

    .theme-toggle svg,
    .back-to-top svg {
      width: 20px;
      height: 20px;
    }

    .back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1000;
      background: var(--bg-paper);
      border: 1px solid var(--border-color);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: var(--transition-smooth);
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .back-to-top:hover {
      background: var(--accent-color);
      color: white;
      transform: translateY(-5px);
    }
  </style>
</head>

<body>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode">
    <!-- Sun icon for dark mode (show when on dark), Moon icon for light mode (show when on light) -->
    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <button class="back-to-top" id="back-to-top" aria-label="Back to Top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <header>
    <h1 class="brand-title">Optimistic Lad</h1>
    <p class="user-meta">26/M</p>
    <p class="brand-subtitle">musings of my heart</p>
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="search through the ink..." autocomplete="off">
    </div>
  </header>

  <main id="app-container">
    <div id="poem-list" class="poem-grid">
      <!-- Injected by JS -->
    </div>

    <div class="pagination">
      <button id="prev-btn" class="nav-btn" disabled>
        ← <span>Prev</span>
      </button>
      <span id="page-indicator" class="page-info">I / IX</span>
      <button id="next-btn" class="nav-btn">
        <span>Next</span> →
      </button>
    </div>
  </main>

  <footer>
    <div class="footer-flourish">
      <svg viewBox="0 0 100 20" fill="none" stroke="currentColor">
        <path d="M0 10 Q25 0 50 10 T100 10" stroke-width="0.5" opacity="0.5" />
        <circle cx="50" cy="10" r="1.5" fill="currentColor" />
      </svg>
    </div>

    <span class="footer-title">Optimistic Lad</span>

    <div class="footer-info">
      <a href="#" class="discord-badge">discord: @th3garrison</a>
    </div>

    <p class="copyright">
      &copy; <span id="year"></span> All Rights Reserved.
    </p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    let allPoems = [];
    let filteredPoems = [];
    let currentPage = 1;
    const itemsPerPage = 15;

    const listElement = document.getElementById('poem-list');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const pageIndicator = document.getElementById('page-indicator');
    const searchInput = document.getElementById('search-input');
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    // Theme Logic
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);
    }

    function updateThemeIcon(theme) {
      if (theme === 'dark') {
        themeIcon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
      } else {
        themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
      }
    }

    themeToggle.onclick = () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    };

    // Back to Top Logic
    const backToTopBtn = document.getElementById('back-to-top');
    window.onscroll = () => {
      const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
      const scrollCurrent = window.scrollY;

      if (scrollTotal > 0 && (scrollCurrent / scrollTotal) > 0.6) {
        backToTopBtn.classList.add('visible');
      } else {
        backToTopBtn.classList.remove('visible');
      }
    };

    backToTopBtn.onclick = () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    initTheme();

    async function init() {
      try {
        const res = await fetch('poems.json');
        const data = await res.json();
        allPoems = data.poems;
        filteredPoems = allPoems;
        renderPage();
      } catch (err) {
        console.error(err);
        listElement.innerHTML = '<div class="message-state">The archives are sealed at the moment.</div>';
      }
    }

    function renderPage() {
      // Smooth transition
      listElement.classList.add('loading');

      setTimeout(() => {
        listElement.innerHTML = '';
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = filteredPoems.slice(start, end);

        if (pageItems.length === 0) {
          listElement.innerHTML = '<div class="message-state">No echoes match your query.</div>';
        } else {
          pageItems.forEach((poem, index) => {
            const card = document.createElement('article');
            card.className = 'poem-card';
            card.style.animationDelay = `${index * 0.05}s`;

            // Count actual visible lines (ignore trailing empty lines)
            const lineCount = poem.content.trim().split('\n').length;
            const isExpandable = lineCount > 2;

            card.innerHTML = `
              <h2>${poem.title}</h2>
              <div class="poem-content">${poem.content}</div>
              ${isExpandable ? '<div class="interaction-hint">Read more →</div>' : ''}
            `;

            if (isExpandable) {
              card.onclick = () => card.classList.toggle('expanded');
            } else {
              card.style.cursor = 'default';
            }

            listElement.appendChild(card);
          });
        }

        updateControls();
        listElement.classList.remove('loading');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 300);
    }

    function toRoman(num) {
      const roman = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
      let str = '';
      for (let i in roman) {
        while (num >= roman[i]) {
          str += i;
          num -= roman[i];
        }
      }
      return str;
    }

    function updateControls() {
      const totalPages = Math.ceil(filteredPoems.length / itemsPerPage) || 1;

      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;

      pageIndicator.textContent = `${toRoman(currentPage)} / ${toRoman(totalPages)}`;
    }

    prevBtn.onclick = () => {
      if (currentPage > 1) {
        currentPage--;
        renderPage();
      }
    };

    nextBtn.onclick = () => {
      const totalPages = Math.ceil(filteredPoems.length / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderPage();
      }
    };

    searchInput.oninput = (e) => {
      const query = e.target.value.toLowerCase();
      filteredPoems = allPoems.filter(p =>
        p.title.toLowerCase().includes(query) ||
        p.content.toLowerCase().includes(query)
      );
      currentPage = 1;
      renderPage();
    };

    init();
  </script>
</body>

</html>
