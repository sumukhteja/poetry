<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optimistic Lad - Field Notes</title>
  <!-- Modern Typography -->
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #111111;
      --accent-color: #000000;
      --secondary-text: #666666;
      --font-main: 'Inter', sans-serif;
      --font-serif: 'EB Garamond', serif;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #fff;
    }

    ::-webkit-scrollbar-thumb {
      background: #eee;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ddd;
    }

    header {
      padding: clamp(2rem, 10vh, 4rem) 1.5rem 2rem;
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      font-weight: 400;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .description {
      color: var(--secondary-text);
      font-size: clamp(1rem, 3vw, 1.2rem);
      margin-top: 0.5rem;
      font-style: italic;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      min-height: 60vh;
    }

    /* Post/Poem Styles */
    .post {
      margin-bottom: 2rem;
      padding: 2rem;
      border-radius: 12px;
      background: #fafafa;
      border: 1px solid #eee;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .post:hover {
      transform: translateY(-2px);
      background: #fdfdfd;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .post h2 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      margin: 0 0 1rem;
      font-weight: 500;
    }

    /* Truncation Logic */
    .poem-body {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      color: #333;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: var(--transition);
      line-height: 1.5;
    }

    .post.expanded .poem-body {
      -webkit-line-clamp: unset;
      line-clamp: unset;
      display: block;
    }

    .expand-hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--secondary-text);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .post.expanded .expand-hint {
      display: none;
    }

    footer {
      width: 100%;
      padding: 4rem 2rem;
      background: #fff;
      text-align: center;
      font-family: var(--font-serif);
      border-top: 1px solid #eee;
    }

    /* Responsive Improvements */
    @media (max-width: 600px) {
      .post {
        padding: 1.5rem;
      }

      .poem-body {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Optimistic Lad</h1>
    <p class="description">Field notes and observations.</p>
  </header>

  <main id="main-content">
    <div class="loading">Reading the journals...</div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="discord-info">
        Find me on discord: @th3garrison<br>
      </div>
      <div class="copyright">
        &copy; <span id="year"></span> Optimistic Lad. All rights reserved.
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    async function loadPoems() {
      const container = document.getElementById('main-content');
      try {
        const response = await fetch('poems.json');
        if (!response.ok) throw new Error('Failed to load poems');

        const data = await response.json();
        container.innerHTML = '';

        data.poems.forEach(poem => {
          const article = document.createElement('article');
          article.className = 'post';

          const formattedContent = poem.content.replace(/\n/g, '<br>');

          article.innerHTML = `
                        <h2>${poem.title}</h2>
                        <div class="poem-body">${formattedContent}</div>
                        <div class="expand-hint">Click to read more →</div>
                    `;

          article.addEventListener('click', () => {
            article.classList.toggle('expanded');
          });

          container.appendChild(article);
        });
      } catch (error) {
        console.error('Error loading poems:', error);
        container.innerHTML = '<p>The notebook is missing. Please refresh.</p>';
      }
    }

    loadPoems();
  </script>
</body>

</html>
