<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optimistic Lad - Poetry Journals</title>
  <!-- Artistic Typography -->
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel:wght@400;500&family=Caveat:wght@400;500&family=Inter:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-paper: #f9f7f2;
      --text-main: #2d2d2d;
      --accent: #7d6e5d;
      --secondary: #8c8c8c;
      --serif: 'EB Garamond', serif;
      --display: 'Cinzel', serif;
      --hand: 'Caveat', cursive;
      --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-paper);
      background-image:
        radial-gradient(#e5e0d5 1px, transparent 1px);
      background-size: 30px 30px;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-paper);
    }

    ::-webkit-scrollbar-thumb {
      background: #d1cdc2;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #c1bcad;
    }

    header {
      padding: clamp(4rem, 15vh, 8rem) 1.5rem 4rem;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 1px;
      background: var(--accent);
      opacity: 0.3;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      font-weight: 400;
      margin: 0;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1a1a1a;
      line-height: 1.1;
    }

    .description {
      font-family: var(--hand);
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      color: var(--accent);
      margin-top: 1rem;
      opacity: 0.8;
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 1.5rem 6rem;
      min-height: 50vh;
    }

    /* Journal Entry Styles */
    .post {
      margin-bottom: 5rem;
      padding: clamp(2rem, 5vw, 3.5rem);
      background: #ffffff;
      border-radius: 2px 3px 2px 4px / 4px 2px 5px 2px;
      box-shadow:
        0 2px 15px rgba(0, 0, 0, 0.02),
        0 10px 40px rgba(0, 0, 0, 0.04);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      border: 1px solid rgba(0, 0, 0, 0.03);
    }

    .post::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0) 0%, rgba(240, 235, 220, 0.1) 100%);
      pointer-events: none;
    }

    .post:hover {
      transform: translateY(-5px) rotate(-0.5deg);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.07);
    }

    .post h2 {
      font-family: var(--display);
      font-size: 1.4rem;
      margin: 0 0 2rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .post h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--accent);
      opacity: 0.1;
    }

    .poem-body {
      font-family: var(--serif);
      font-size: 1.45rem;
      color: #222;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: var(--transition);
      line-height: 1.8;
      font-style: italic;
    }

    .post.expanded .poem-body {
      -webkit-line-clamp: unset;
      line-clamp: unset;
      display: block;
    }

    .expand-hint {
      margin-top: 2rem;
      font-family: var(--hand);
      font-size: 1.2rem;
      color: var(--secondary);
      opacity: 0.6;
      transition: var(--transition);
    }

    .post:hover .expand-hint {
      opacity: 1;
      color: var(--accent);
    }

    .post.expanded .expand-hint {
      display: none;
    }

    footer {
      padding: 6rem 2rem;
      text-align: center;
    }

    .footer-content {
      max-width: 600px;
      margin: 0 auto;
      font-family: var(--serif);
      color: var(--secondary);
      font-size: 0.95rem;
    }

    .discord-info {
      font-family: var(--hand);
      font-size: 1.5rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .loading {
      text-align: center;
      font-family: var(--hand);
      font-size: 1.6rem;
      opacity: 0.5;
      padding-top: 4rem;
    }

    /* Search Styling */
    .search-container {
      margin-top: 2rem;
      position: relative;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    #search-input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: none;
      background: transparent;
      border-bottom: 1px solid rgba(125, 110, 93, 0.2);
      font-family: var(--hand);
      font-size: 1.2rem;
      text-align: center;
      color: var(--text-main);
      transition: var(--transition);
      outline: none;
    }

    #search-input:focus {
      border-bottom-color: var(--accent);
      letter-spacing: 0.05em;
    }

    #search-input::placeholder {
      color: var(--secondary);
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <header>
    <h1>Optimistic Lad</h1>
    <p class="description">poetry</p>
    <div class="search-container">
      <input type="text" id="search-input" placeholder="search through the ink..." autocomplete="off">
    </div>
  </header>

  <main id="main-content">
    <div class="loading">Inking the pages...</div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="discord-info">
        @th3garrison • discord
      </div>
      <div class="copyright">
        &copy; <span id="year"></span> OPTIMISTIC LAD. ALL RIGHTS RESERVED.
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    let allPoems = [];

    async function loadPoems() {
      const container = document.getElementById('main-content');
      try {
        const response = await fetch('poems.json');
        if (!response.ok) throw new Error('Failed to load poems');

        const data = await response.json();
        allPoems = data.poems;
        renderPoems(allPoems);

      } catch (error) {
        console.error('Error loading poems:', error);
        container.innerHTML = '<div class="loading">The journal was misplaced. Please return later.</div>';
      }
    }

    function renderPoems(poemsToRender) {
      const container = document.getElementById('main-content');
      container.innerHTML = '';

      if (poemsToRender.length === 0) {
        container.innerHTML = '<div class="loading">No ink found for that search...</div>';
        return;
      }

      poemsToRender.forEach(poem => {
        const article = document.createElement('article');
        article.className = 'post';

        const formattedContent = poem.content.replace(/\n/g, '<br>');

        article.innerHTML = `
                    <h2>${poem.title}</h2>
                    <div class="poem-body">${formattedContent}</div>
                    <div class="expand-hint">unfold entry →</div>
                `;

        article.addEventListener('click', () => {
          article.classList.toggle('expanded');
        });

        container.appendChild(article);
      });
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allPoems.filter(poem =>
        poem.title.toLowerCase().includes(term) ||
        poem.content.toLowerCase().includes(term)
      );
      renderPoems(filtered);
    });

    loadPoems();
  </script>
</body>

</html>
