<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>unposted letter</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DR856F0TKD"></script>

  <meta name="description"
    content="A curated collection of poetry and field notes, presented in a minimalist, tactile digital archive.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Premium Typography -->
  <link
    href="https://fonts.googleapis.com/css2?family=La+Belle+Aurore&family=Cinzel:wght@400;500;700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* Palette: Sophisticated Neutrals (Light) */
      --bg-canvas: #fbfaf8;
      --bg-paper: #ffffff;
      --bg-flap: #fdfdfd;
      --text-primary: #1a1a1a;
      --text-secondary: #5a5a5a;
      --accent-color: #726456;
      --accent-soft: rgba(114, 100, 86, 0.1);
      --border-color: rgba(0, 0, 0, 0.06);
      --grid-color: rgba(0, 0, 0, 0.03);

      /* Typography */
      --font-serif: 'EB Garamond', serif;
      --font-display: 'Cinzel', serif;
      --font-hand: 'La Belle Aurore', cursive;
      --font-sans: 'Inter', sans-serif;

      /* Motion */
      --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --bg-canvas: #121212;
      --bg-paper: #1a1a1a;
      --bg-flap: #222222;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --accent-color: #c4b5a6;
      --accent-soft: rgba(196, 181, 166, 0.1);
      --border-color: rgba(255, 255, 255, 0.1);
      --grid-color: rgba(255, 255, 255, 0.04);
    }

    [data-theme="dark"] body::before {
      display: none;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body {
      cursor: url('cursor.svg'), auto;
      margin: 0;
      background-color: var(--bg-canvas);
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 50px 50px;
      color: var(--text-primary);
      font-family: var(--font-serif);
      line-height: 1.8;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: panningGrid 60s linear infinite;
    }

    @keyframes panningGrid {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 0 500px;
      }
    }

    /* Subtle Grain Texture */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://www.transparenttextures.com/patterns/asfalt-light.png");
      opacity: 0.15;
      pointer-events: none;
      z-index: 100;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-canvas);
    }

    ::-webkit-scrollbar-thumb {
      background: #d4d0c8;
      border-radius: 10px;
    }

    header {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .brand-title {
      font-family: var(--font-hand);
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      text-transform: none;
      margin-bottom: 0.2rem;
      color: var(--text-primary);
      position: relative;
      display: inline-block;
    }

    .author-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 0.5rem 0;
    }

    .user-meta {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      opacity: 0.7;
      margin: 0;
    }

    .brand-subtitle {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.4rem;
      color: var(--accent-color);
      letter-spacing: 0.02em;
      margin-top: 0.5rem;
      opacity: 0.8;
    }

    .search-wrapper {
      margin: 2.5rem auto 0;
      max-width: 400px;
      position: relative;
    }

    #search-input {
      width: 100%;
      padding: 1rem 1.5rem;
      border: 1px solid var(--border-color);
      background: var(--bg-paper);
      font-family: var(--font-serif);
      font-size: 1rem;
      font-style: italic;
      text-align: center;
      border-radius: 50px;
      transition: var(--transition-smooth);
      outline: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
      color: var(--text-primary);
    }

    #search-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 8px 30px rgba(114, 100, 86, 0.1);
      transform: translateY(-2px);
    }

    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    /* Poem Entry Layout */
    .poem-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 3.5rem;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    @media (min-width: 1024px) {
      .poem-grid {
        grid-template-columns: repeat(3, 1fr);
        column-gap: 3rem;
        row-gap: 8rem;
        align-items: start;
      }

      /* Staggered organic offset for the middle column */
      .poem-card:nth-child(3n+2) {
        margin-top: 8rem;
      }
    }

    .poem-grid.loading {
      opacity: 0;
    }

    .poem-card {
      background: var(--bg-paper);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      position: relative;
      cursor: url('cursor.svg'), pointer;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      perspective: 2000px;
      overflow: visible;
      margin-top: 2rem;
      /* Give space for the flap to open upwards */
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* The Envelope Flap */
    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: var(--bg-flap);
      border: 1px solid var(--border-color);
      border-bottom: none;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.8s;
      z-index: 10;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
    }
    
    .envelope-flap::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(0,0,0,0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .poem-card.expanded .envelope-flap {
      transform: rotateX(180deg);
      box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.05); /* Shadow flipped */
      z-index: 1;
    }

    .poem-card-inner {
      padding: 3.5rem 2rem 2.5rem;
      /* Space for the flap point */
      background: var(--bg-paper);
      border-radius: 8px;
      position: relative;
      z-index: 2;
      transition: inherit;
    }

    .poem-card.expanded .poem-card-inner {
      padding-top: 2.5rem;
    }

    /* Staggered organic offset for the middle column */
    @media (min-width: 1024px) {
      .poem-grid {
        grid-template-columns: repeat(3, 1fr);
        column-gap: 3rem;
        row-gap: 12rem;
        /* Increased for flaps */
        align-items: start;
      }

      .poem-card:nth-child(3n+2) {
        margin-top: 10rem;
      }
    }

    .poem-card h2 {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 400;
      margin: 0 0 1rem;
      color: var(--accent-color);
      letter-spacing: -0.01em;
      text-transform: lowercase;
      display: inline-block;
    }


    .poem-body-wrapper {
      max-height: 4.8rem;
      /* Preview state */
      overflow: hidden;
      transition: max-height 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .poem-card.expanded .poem-body-wrapper {
      max-height: 2000px;
    }

    .poem-content {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      color: var(--text-primary);
      white-space: pre-wrap;
      line-height: 1.8;
      padding-top: 0.5rem;
    }

    .interaction-hint {
      margin-top: 1.5rem;
      font-family: var(--font-hand);
      font-size: 1.1rem;
      color: var(--accent-color);
      opacity: 0.5;
      transition: opacity 0.5s;
    }

    .poem-card:hover .interaction-hint {
      opacity: 0.9;
    }

    .poem-card.expanded .interaction-hint {
      display: none;
    }

    /* Queen Special Card Styling */
    .poem-card.queen-special {
      background: #fff0f6;
      border-color: rgba(255, 182, 193, 0.4);
      box-shadow: 0 10px 30px rgba(255, 182, 193, 0.1);
    }

    .poem-card.queen-special .envelope-flap {
      background: #fff5f8;
      border-color: rgba(255, 182, 193, 0.6);
      filter: drop-shadow(0 2px 2px rgba(255, 182, 193, 0.2)); /* Pinkish shadow */
    }

    .poem-card.queen-special .envelope-flap::after {
      background: linear-gradient(180deg, rgba(255, 182, 193, 0.1) 0%, transparent 50%); /* Pink gradient */
    }

    .poem-card.queen-special .poem-card-inner {
      background: transparent;
    }

    .poem-card.queen-special h2 {
      color: #d18ba1;
      font-weight: 500;
    }

    [data-theme="dark"] .poem-card.queen-special {
      background: #22161a; /* Deeper base */
      border-color: rgba(255, 182, 193, 0.2);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
    }

    [data-theme="dark"] .poem-card.queen-special .envelope-flap {
      background: #2d1d22; /* Slightly lighter/rose-tinted flap for contrast */
      border-color: rgba(255, 182, 193, 0.3);
      filter: drop-shadow(0 2px 3px rgba(255, 182, 193, 0.1));
    }

    [data-theme="dark"] .poem-card.queen-special .envelope-flap::after {
      background: linear-gradient(180deg, rgba(255, 182, 193, 0.05) 0%, transparent 50%);
    }

    [data-theme="dark"] .poem-card.queen-special h2 {
      color: #ffb6c1;
    }

    /* Pagination controls */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin: 8rem 0 4rem;
      font-family: var(--font-display);
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      padding: 0.6rem 1.2rem;
      cursor: url('cursor.svg'), pointer;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: var(--accent-color);
      transition: var(--transition-smooth);
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-info {
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 0.2em;
    }

    footer {
      padding: 2rem 1.5rem 4rem;
      background: transparent;
      border-top: 1px solid transparent;
      text-align: center;
      position: relative;
    }

    .footer-flourish {
      width: 100%;
      max-width: 80px;
      margin: 0 auto 3rem;
      color: var(--accent-color);
      opacity: 0.4;
    }

    .footer-signature {
      font-family: var(--font-hand);
      font-size: 3.5rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      opacity: 0.85;
      /* transform: rotate(-3deg); */
      display: inline-block;
      text-decoration: none;
      cursor: url('cursor.svg'), pointer;
    }

    .footer-poetic {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-style: italic;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      opacity: 0.6;
    }

    .copyright {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 0.2em;
      text-transform: lowercase;
      opacity: 0.4;
    }

    /* Empty/Loading states */
    .message-state {
      text-align: center;
      padding: 5rem 0;
      font-family: var(--font-hand);
      font-size: 2rem;
      color: var(--text-secondary);
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      header {
        padding-top: 3rem;
      }

      .poem-card {
        padding: 2rem 1.5rem;
      }

      .pagination {
        gap: 0.5rem;
      }


      .theme-toggle.scrolled,
      .audio-toggle.scrolled {
        opacity: 0;
        visibility: hidden;
        transform: translateY(-20px);
      }
    }

    /* Fixed Toggle Button Styles */
    .theme-toggle {
      position: fixed;
      top: 2rem;
      right: 2rem;
      z-index: 1000;
      background: var(--bg-paper);
      border: 1px solid var(--border-color);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: url('cursor.svg'), pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: var(--transition-smooth);
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    .theme-toggle svg,
    .audio-toggle svg,
    .back-to-top svg {
      width: 20px;
      height: 20px;
    }

    .audio-toggle {
      position: fixed;
      top: 6rem;
      right: 2rem;
      z-index: 1000;
      background: var(--bg-paper);
      border: 1px solid var(--border-color);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: url('cursor.svg'), pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: var(--transition-smooth);
    }

    .audio-toggle:hover {
      transform: scale(1.1);
    }

    .ink-trail {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #d18ba1;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%) scale(1);
      opacity: 0.4;
      transition: transform 0.6s ease-out, opacity 0.6s ease-out;
    }

    .poem-card.expanded .poem-content {
      animation: inkSettle 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes inkSettle {
      0% {
        filter: blur(3px);
        opacity: 0.5;
      }

      100% {
        filter: blur(0px);
        opacity: 1;
      }
    }

    .back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1000;
      background: var(--bg-paper);
      border: 1px solid var(--border-color);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: url('cursor.svg'), pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: var(--transition-smooth);
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .back-to-top:hover {
      background: var(--accent-color);
      color: white;
      transform: translateY(-5px);
    }

    .message-me-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      text-decoration: none;
      font-family: var(--font-serif);
      font-size: 1.35rem;
      letter-spacing: 0.1em;
      opacity: 0.7;
      transition: var(--transition-smooth);
      margin: 0;
      padding: 0;
      cursor: url('cursor.svg'), pointer;
    }

    .message-me-btn:hover {
      opacity: 1;
      color: var(--accent-color);
      transform: translateY(-2px);
    }

    .message-me-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Entrance Overlay (Poetic Dialog) */
    #entrance-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] #entrance-overlay {
      background: rgba(0, 0, 0, 0.6);
    }

    #entrance-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .audio-popup-card {
      background: var(--bg-paper);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 3rem 4rem;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      transform: translateY(20px);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      max-width: 90vw;
      width: 500px;
    }

    .audio-popup-card p {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      color: var(--text-primary);
      margin: 0 0 2.5rem;
      line-height: 1.6;
      font-style: italic;
    }

    .audio-popup-actions {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .audio-btn {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--text-primary);
      background: transparent;
      border: 1px solid var(--border-color);
      padding: 0.8rem 2rem;
      border-radius: 50px;
      cursor: url('cursor.svg'), pointer;
      letter-spacing: 0.05em;
      transition: var(--transition-smooth);
      text-transform: lowercase;
    }

    .audio-btn:hover {
      background: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>

<body>

  <!-- Entrance Overlay -->
  <div id="entrance-overlay">
    <div class="audio-popup-card">
      <p>shall we play some ambient sounds?</p>
      <div class="audio-popup-actions">
        <button class="audio-btn" id="audio-yes-btn">play melody</button>
        <button class="audio-btn" id="audio-no-btn">read in silence</button>
      </div>
    </div>
  </div>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode">
    <!-- Sun icon for dark mode (show when on dark), Moon icon for light mode (show when on light) -->
    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <button class="audio-toggle" id="audio-toggle" aria-label="Toggle Ambient Audio">
    <svg id="audio-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <!-- Muted by default -->
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
  </button>

  <button class="back-to-top" id="back-to-top" aria-label="Back to Top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <header>
    <a href="./" style="text-decoration: none; color: inherit;">
      <h1 class="brand-title">unposted letter</h1>
    </a>
    <div class="author-info">
      <p class="user-meta">26/M</p>
      <a href="https://discord.gg/bRMktSVY" class="message-me-btn" target="_blank" aria-label="Message Me">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <rect width="20" height="16" x="2" y="4" rx="2"></rect>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
        </svg>
        <span class="btn-text">message</span>
      </a>
    </div>
    <p class="brand-subtitle">musings of my heart</p>
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="find" autocomplete="off">
    </div>
  </header>

  <main id="app-container">
    <div id="poem-list" class="poem-grid">
      <!-- Injected by JS -->
    </div>

    <div class="pagination">
      <button id="prev-btn" class="nav-btn" disabled>
        <span>Prev</span>
      </button>
      <span id="page-indicator" class="page-info">I / IX</span>
      <button id="next-btn" class="nav-btn">
        <span>Next</span>
      </button>
    </div>
  </main>

  <footer>
    <div class="footer-flourish">
      <svg viewBox="0 0 100 40" fill="none" stroke="currentColor">
        <path d="M 0,20 C 30,20 30,0 50,0 C 70,0 70,20 100,20" stroke-width="0.5" opacity="0.5" />
        <path d="M 0,20 C 30,20 30,40 50,40 C 70,40 70,20 100,20" stroke-width="0.5" opacity="0.5" />
        <circle cx="50" cy="20" r="2.5" fill="currentColor" opacity="0.8" />
      </svg>
    </div>

    <a href="#" onclick="location.reload(); return false;" class="footer-signature">unposted letter</a>
    <div class="footer-poetic">my poetry collection</div>

    <p class="copyright">
      &copy; <span id="year"></span> all rights reserved.
    </p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    let allPoems = [];
    let filteredPoems = [];
    let currentPage = 1;
    const itemsPerPage = 15;

    const listElement = document.getElementById('poem-list');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const pageIndicator = document.getElementById('page-indicator');
    const searchInput = document.getElementById('search-input');
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    // Theme Logic
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);
    }

    function updateThemeIcon(theme) {
      if (theme === 'dark') {
        themeIcon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
      } else {
        themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
      }
    }

    themeToggle.onclick = () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    };

    // Back to Top Logic
    const backToTopBtn = document.getElementById('back-to-top');
    window.onscroll = () => {
      const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
      const scrollCurrent = window.scrollY;

      if (scrollTotal > 0 && (scrollCurrent / scrollTotal) > 0.6) {
        backToTopBtn.classList.add('visible');
      } else {
        backToTopBtn.classList.remove('visible');
      }

      // Hide mobile toggles after hero
      if (window.innerWidth <= 600) {
        const header = document.querySelector('header');
        if (scrollCurrent > header.offsetHeight) {
          themeToggle.classList.add('scrolled');
          const aToggle = document.getElementById('audio-toggle');
          if (aToggle) aToggle.classList.add('scrolled');
        } else {
          themeToggle.classList.remove('scrolled');
          const aToggle = document.getElementById('audio-toggle');
          if (aToggle) aToggle.classList.remove('scrolled');
        }
      }
    };

    backToTopBtn.onclick = () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    initTheme();

    async function init() {
      try {
        const res = await fetch('poems.json');
        const data = await res.json();
        allPoems = data.poems;
        filteredPoems = allPoems;
        renderPage();
      } catch (err) {
        console.error(err);
        listElement.innerHTML = '<div class="message-state">The archives are sealed at the moment.</div>';
      }
    }

    const paperSound = new Audio('paper.mp3');

    function renderPage() {
      // Smooth transition
      listElement.classList.add('loading');

      setTimeout(() => {
        listElement.innerHTML = '';
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = filteredPoems.slice(start, end);

        if (pageItems.length === 0) {
          listElement.innerHTML = '<div class="message-state">No echoes match your query.</div>';
        } else {
          pageItems.forEach((poem, index) => {
            const card = document.createElement('article');
            card.className = 'poem-card';
            if (poem.id === 'my-queen') {
              card.classList.add('queen-special');
            }
            card.style.animationDelay = `${index * 0.05}s`;

            // Count actual visible lines (ignore trailing empty lines)
            const lineCount = poem.content.trim().split('\n').length;
            const isExpandable = lineCount > 2;

            card.innerHTML = `
              <div class="envelope-flap"></div>
              <div class="poem-card-inner">
                <h2>${poem.title}</h2>
                <div class="poem-body-wrapper">
                  <div class="poem-content">${poem.content}</div>
                </div>
                ${isExpandable ? '<div class="interaction-hint">open envelope...</div>' : ''}
              </div>
            `;

            if (isExpandable) {
              card.onclick = () => {
                paperSound.currentTime = 0.3;
                paperSound.play().catch(e => console.log("Audio play blocked by browser."));
                card.classList.toggle('expanded');
              };
            } else {
              card.style.cursor = "url('cursor.svg'), default";
            }

            listElement.appendChild(card);
          });
        }

        updateControls();
        listElement.classList.remove('loading');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 300);
    }

    function toRoman(num) {
      const roman = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
      let str = '';
      for (let i in roman) {
        while (num >= roman[i]) {
          str += i;
          num -= roman[i];
        }
      }
      return str;
    }

    function updateControls() {
      const totalPages = Math.ceil(filteredPoems.length / itemsPerPage) || 1;

      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;

      pageIndicator.textContent = `${toRoman(currentPage)} / ${toRoman(totalPages)}`;
    }

    prevBtn.onclick = () => {
      if (currentPage > 1) {
        currentPage--;
        renderPage();
      }
    };

    nextBtn.onclick = () => {
      const totalPages = Math.ceil(filteredPoems.length / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderPage();
      }
    };

    searchInput.oninput = (e) => {
      const query = e.target.value.toLowerCase();
      filteredPoems = allPoems.filter(p =>
        p.title.toLowerCase().includes(query) ||
        p.content.toLowerCase().includes(query)
      );
      currentPage = 1;
      renderPage();
    };

    init();

    // Ambient Audio Logic
    const ambientAudio = new Audio('bg.mp3');
    ambientAudio.loop = true;
    ambientAudio.volume = 0.6;
    const audioToggle = document.getElementById('audio-toggle');
    const audioIcon = document.getElementById('audio-icon');
    let isPlaying = false;

    audioToggle.onclick = () => {
      if (isPlaying) {
        ambientAudio.pause();
        audioIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>`;
      } else {
        ambientAudio.play().catch(e => console.log("Ambient audio blocked."));
        audioIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>`;
      }
      isPlaying = !isPlaying;
    };

    // Auto-play ambient audio on entrance
    const entranceOverlay = document.getElementById('entrance-overlay');
    const audioYesBtn = document.getElementById('audio-yes-btn');
    const audioNoBtn = document.getElementById('audio-no-btn');

    audioYesBtn.onclick = () => {
      entranceOverlay.classList.add('hidden');
      if (!isPlaying) {
        ambientAudio.play().then(() => {
          isPlaying = true;
          audioIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>`;
        }).catch(e => console.log("Audio play blocked."));
      }
    };

    audioNoBtn.onclick = () => {
      entranceOverlay.classList.add('hidden');
    };

    // Fading Ink Trail Cursor Logic
    let lastX = 0, lastY = 0;

    document.addEventListener('mousemove', (e) => {
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;

      // Drop ink every 20px to avoid DOM bloat but keep trail smooth
      if (Math.hypot(dx, dy) > 20) {
        lastX = e.clientX;
        lastY = e.clientY;

        const drop = document.createElement('div');
        drop.className = 'ink-trail';
        drop.style.left = e.clientX + 'px';
        drop.style.top = e.clientY + 'px';

        document.body.appendChild(drop);

        // Force reflow to ensure transition starts from scale(1)
        void drop.offsetWidth;

        drop.style.transform = 'translate(-50%, -50%) scale(0.1)';
        drop.style.opacity = '0';

        // Cleanup
        setTimeout(() => {
          drop.remove();
        }, 600);
      }
    });
  </script>
</body>

</html>
